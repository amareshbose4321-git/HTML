<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ID and Class</title>
    <link rel="stylesheet" href="ID and Class.css">
</head>

<body>

    <!-- 
    🔹 id
    Used to give a unique name to a single element.
    Each id value should appear only once in a page.
    Often used for JavaScript or linking (like anchors). 
    -->
    <!-- Ex:  -->
    <h1 id="title">Hello World</h1>

    <!-- 
     🔹 class
    Used to group multiple elements together.
    The same class can be used on many elements.
    Mainly used for styling multiple elements at once.
    -->
    <!-- Ex:  -->
    <p class="text">Paragraph 1</p>
    <p class="text">Paragraph 2</p>

    <!-- Using BOTH id and class in same element -->
    <!-- Ex:  -->
    <p id="special" class="write">This paragraph has both id and class</p>



</body>

</html>
