<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms</title>
</head>

<body>

    <!-- 
    Why Do We Use Forms?
    Forms serve as the gateway between the user and the server, allowing for dynamic, interactive web experiences. 
    
    They are crucial for tasks such as user authentication, data submission, feedback collection, and more. Simply put, forms make websites more engaging and functional. 
    -->

    <!-- 🔹 Basic Structure -->
    <!-- 
    Syntax:
    <form>
        form elements go here 
    </form>
    -->

    <!-- 
    ---------------------------
    🔹 Common Form Elements 
    ---------------------------
    -->

    <h2>
        <ul>
            <li><u>Common Form Elements</u></li>
        </ul>
    </h2>

    <!-- 1. Input fields -->
    <!--     
    Sybtax:
    <input type="text" placeholder="Enter name">
    <input type="email" placeholder="Enter email">
    <input type="password" placeholder="Enter password"> 
    -->
    <!-- 
    <input> -> is used to take data from the user 
    placeholder -> Its a attribite. It shows a hint (light text) inside the input box
    -->
    <!-- Ex: -->
    <Form>
        <input type="text" placeholder="Enter name">
    </Form>

    <hr>
    <!-- 
    🔹 type in <input>
    👉 type defines what kind of input field you want

    It tells the browser:
    ➡️ “What type of data the user will enter?” 
    -->

    <!-- 
    🔥 Common type values
    <input type="text">  normal text 
    <input type="email">  email format 
    <input type="password">  hidden text 
    <input type="number">  numbers only 
    <input type="radio">  select one option 
    <input type="checkbox">  select multiple 
    <input type="date">  date picker 
    <input type="file">  upload file 
    <input type="submit"> submit button 
    -->

    <!-- 2. Label (<label>)

       Label is Used to describe input fields.
       for -> It connects the label to the input.
       The value of for must match the id of the input so, they are linked.
       for="name"
       id="name"

           🎯 Why is this important?
        1. Click Behavior (UX improvement)
        When you click on the label text, the input gets focused.
        👉 Try mentally:
        Click on “Name” → cursor goes to input

        id -> unique identifire, which is help to conncet with js and css for functionalities and styling.

        type -> it shows what type of input field is.

        placeholder -> Its a attribite. It shows a hint (light text) inside the input box

        name="username" -> is sending the data in backend server. If i don't write name then the data won't be send to the server.
        like this : name="username" is question and do some input like for example "Amaresh".
        So, username=Amaresh send to the server.   
        And also it is Used to identify data when sent to server. 
       -->

    <label for="name">Name:</label>
    <input type="text" id="name" placeholder="Enter name" name="username">

    <hr>
    <!-- 3. Textarea (<textarea>)

        For large text input. -->
    <label for="describe">feedback</label>
    <textarea name="feedback" id="describe" rows="4" cols="30" placeholder="ENTER YOUR FEEDBACK"></textarea>

    <hr>

    <!-- 4. Select Dropdown (<select>) -->
    <!-- select -> its create a dropdown menu -->

    <label>select:</label>
    <select>
        <option>India</option>
        <option>USA</option>
        <option>UK</option>
    </select>

    <hr>

    <!-- 5. Button (<button>) 
        
    Types:
    submit -> submit all data which is filled by user in form.
    reset -> reset all the data by default
    button -> it is used to pair the button with javascript and it is not used for submit or reset the data.
    -->

    <label for="">buttons:</label>
    <button type="submit">Submit</button>
    <button type="reset">Reset</button>
    <button type="button">Button</button>


    <!-- 🔷 Radio vs Checkbox -->

    <!-- Radio (only one option) -->
    <label>radio:</label>
    <input type="radio" name="gender" value="male"> Male
    <input type="radio" name="gender" value="female"> Female
    <input type="radio" name="gender" value="others">Others
    <hr>

    <!-- Checkbox (multiple options) -->
    <label>checkbox:</label>
    <input type="checkbox" name="hobby"> Music
    <input type="checkbox" name="hobby"> Sports
    <input type="checkbox" name="hobby"> Drawing
    <hr>


    <!-- 5. readonly & disabled -->

    <!-- 🔒 readonly:
    User can see the value
    User CANNOT edit it
    Value WILL be sent when form is submitted

    💡 Think:
    👉 “Read only = just view, no editing” -->
    <label>readonly:</label>
    <input type="text" value="Criteria under 30" readonly>
    <hr>

    <!-- 🚫 disabled
    User CANNOT edit
    Input looks greyed out
    Value WILL NOT be sent in form submission
    💡 Think:

    👉 “Disabled = completely inactive” -->
    <label>disabled:</label>
    <input type="text" value="Must be above 18" disabled>
    <hr>
    <hr>

    <!-- 
    --------------------------
    🔷 Important Attributes -
    --------------------------
    -->

    <h2>
        <ul>
            <li><u>Important Attributes</u></li>
        </ul>
    </h2>

    <!-- 1. name
    Used to identify data when sent to server -->
    <label>name attribute</label>
    <input type="text" name="username">
    <hr>

    <!-- 2. placeholder
    Hint text inside input -->
    <label>placeholder attribute</label>
    <input type="text" placeholder="Enter your name">
    <hr>

    <!-- 3. required
    Makes field mandatory -->
    <label>required attribute</label>
    <input type="number" placeholder="enter phone number" required>
    <hr>

    <!-- 4. value
    Default value -->
    <label>value attribute</label>
    <input type="text" value="Amaresh">
    <hr>

    <!-- autofocus
    The autofocus attribute automatically focuses the cursor on the particular input when the page loads. -->

    <label>autofocus attribute</label>
    <input type="text" autofocus>
    <hr>

    <!-- pattern
    The pattern attribute specifies a regular expression that the input must match to be valid. -->

    <label>pattern attribute</label>
    <input type="text" pattern="[a-zA-Z0-9]+">

    <!-- 
    👉 pattern = a rule (regex) that the input must follow
    👉 If user input doesn't match, the form won't submit

    Meaning:
    a-z → small letters (a to z)
    A-Z → capital letters (A to Z)
    0-9 → numbers
    + → at least 1 character required

    👉 So this allows:
    Amaresh123
    hello9 
    -->

    <!-- 🔐 Strong password (with special characters) -->
    <hr>
    <label>Create a password</label>
    <input type="password" placeholder="Create a strong password"
        pattern="(?=.*[a-z])(?=.*[A-Z])(?=.*[0-9])(?=.*[!@#$%^&*]).{8,}"
        title="Must contain at least 1 lowercase, 1 uppercase, 1 number, 1 special character (!@#$%^&*), and be 8+ characters long">

    <!-- 🧠 Breakdown:
    (?=.*[a-z]) → at least 1 lowercase
    (?=.*[A-Z]) → at least 1 uppercase
    (?=.*[0-9]) → at least 1 number
    (?=.*[!@#$%^&*]) → at least 1 special character
    .{8,} → minimum 8 characters
    🎯 Valid examples:

    ✔ Amaresh@123
    ✔ Strong#Pass1

    ❌ Amaresh123 (no special character)
    ❌ abc@123 (no capital letter) 
    -->
    <hr>

    <!-- action
    The action attribute specifies the URL where the form data should be sent after submission. -->

    <form action="/submit.php" method="POST">
    </form>

    <!-- method
    The method attribute defines how data is sent. The two most common methods are GET and POST. -->

    <form action="/submit.php" method="POST">
    </form>

    <!-- 
    Key Attributes:
    action → Where the form data is sent
    method → How data is sent (GET or POST)

    🔷 GET vs POST (Very Important)
    They are HTTP methods used when a form sends data to a server.

    ✅ GET Features:
    Data is visible in URL
    Can be bookmarked
    Limited data size
    Faster & simple

    ❌ Not safe for:
    Passwords
    Sensitive data

    ✅ Features:
    Data is hidden from URL
    More secure than GET
    Can send large data
    Used for forms like login/signup

    🔥 Key Differences
    | Feature       | GET       | POST |
    | ------------- | -------   | --------  
    | Data location | URL         Body      
    | Visible?      | ✅ Yes      Body      
    | Security      | ❌ Low     ✅ Better 
    | Data size     | Limited     Large     
    | Bookmark      | ✅ Yes     ❌ No

    
    ⚡ Easy Memory Trick:
    GET → “Give me data” (read, search)
    POST → “Post data” (send, submit)
    👉 If nothing changes on server → use GET
    👉 If data is created/changed → use POST

    🧠 When to use:
    Use GET → searching, filtering 
    Use POST → login, signup, payment 
    -->


</body>

</html>
